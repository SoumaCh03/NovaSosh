name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: nova_test
          POSTGRES_DB: nova_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nova"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nova:nova_test@localhost:5432/nova_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-test-secret-please-override-in-real-environments

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run prisma:generate
      - name: Run migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
      - run: npm test
      - run: npm run build
